name: junshan-web CI

on:
  push:
    branches: [main]
    paths:
      - 'junshan-web/**'
      - '.github/workflows/junshan-web-ci.yml'
  pull_request:
    paths:
      - 'junshan-web/**'
      - '.github/workflows/junshan-web-ci.yml'

defaults:
  run:
    working-directory: junshan-web

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: junshan-web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
