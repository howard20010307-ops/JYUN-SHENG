# Netlify 會讀此檔，可覆寫網站上灰掉的 Publish directory 等設定。
# 儲存庫根目錄在「鈞泩放樣工程行」，實際 Vite 專案在 junshan-web/。

[build]
  base = "junshan-web"
  # 若曾出現 npm ci 失敗，多為 package-lock 未推上 Git；可改 npm install
  command = "npm install && npm run build"
  # 有設定 base 時，publish 為「相對於 junshan-web 資料夾」的路徑（Vite 預設輸出 dist）
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# 單頁應用：避免直接打網址子路徑時 404
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
